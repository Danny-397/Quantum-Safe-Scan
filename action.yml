name: "QuantumSafe Scanner"
description: "Scan a codebase for quantum-vulnerable cryptography and upload SARIF to code scanning."
author: "QuantumSafe"
branding:
  icon: "shield"
  color: "blue"

inputs:
  path:
    description: "Directory to scan."
    required: false
    default: "."
  output:
    description: "SARIF output file."
    required: false
    default: "quantumsafe.sarif"
  exclude:
    description: "Comma-separated glob(s) of paths to skip (e.g. tests/*,vendor/*)."
    required: false
    default: ""
  fail-on-high:
    description: "Fail the job if any HIGH-risk finding is present."
    required: false
    default: "false"
  version:
    description: "Version of quantumsafe-scan to install (e.g. 0.2.0). Default: latest."
    required: false
    default: ""

outputs:
  sarif-file:
    description: "Path to the SARIF report produced by the scan."
    value: "${{ inputs.output }}"

runs:
  using: "composite"
