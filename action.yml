name: "QuantumSafe"
description: "Scan a codebase for quantum-vulnerable cryptography and upload SARIF to code scanning."
author: "QuantumSafe"
branding:
  icon: "shield"
  color: "blue"

inputs:
  path:
    description: "Directory to scan."
    required: false
    default: "."
  output:
    description: "SARIF output file."
    required: false
    default: "quantumsafe.sarif"
  exclude:
    description: "Comma-separated glob(s) of paths to skip (e.g. tests/*,vendor/*)."
    required: false
    default: ""
  fail-on-high:
    description: "Fail the job if any HIGH-risk finding is present."
    required: false
    default: "false"
  version:
    description: "Version of quantumsafe-scan to install (e.g. 0.2.0). Default: latest."
    required: false
    default: ""

outputs:
  sarif-file:
    description: "Path to the SARIF report produced by the scan."
    value: "${{ inputs.output }}"

runs:
  using: "composite"
  steps:
    - uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install QuantumSafe
      shell: bash
      run: |
        if [ -n "${{ inputs.version }}" ]; then
          pip install --upgrade "quantumsafe-scan==${{ inputs.version }}"
        else
          pip install --upgrade quantumsafe-scan
        fi

    - name: Run QuantumSafe scan
      shell: bash
      run: |
        ARGS=(scan --path "${{ inputs.path }}" --output "${{ inputs.output }}" --no-sync)
        if [ "${{ inputs.fail-on-high }}" = "true" ]; then ARGS+=(--fail-on-high); fi
        IFS=',' read -ra EX <<< "${{ inputs.exclude }}"
        for g in "${EX[@]}"; do [ -n "$g" ] && ARGS+=(--exclude "$g"); done
        quantumsafe "${ARGS[@]}"
