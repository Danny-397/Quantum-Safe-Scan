name: QuantumSafe Scan

# Demonstrates QuantumSafe running as a CI security gate: it scans the example
# codebase, produces SARIF, and uploads it so findings appear in the repo's
# Security tab (Code scanning alerts).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install QuantumSafe
        run: pip install -e .

      - name: Scan example codebase
        # examples/ is intentionally vulnerable, so we don't fail the build here.
        run: quantumsafe scan --path examples --output quantumsafe.sarif

      - name: Upload SARIF to code scanning
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: quantumsafe.sarif
          category: quantumsafe
